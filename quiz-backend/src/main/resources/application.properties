spring.application.name=quiz-app
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_database?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable SQL init scripts (since you already populated quiz_database)
spring.sql.init.mode=never
# spring.sql.init.schema-locations=classpath:init-db.sql
# spring.jpa.defer-datasource-initialization=true

# Logging Configuration - Reduce verbose output
logging.level.root=WARN
logging.level.com.quiz=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Enable Springdoc OpenAPI (Swagger UI)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Customize the path for the OpenAPI JSON
springdoc.api-docs.path=/api-docs

# Customize the path for Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Optional: set default group name
springdoc.group-configs[0].group=quiz-api
springdoc.group-configs[0].paths-to-match=/api/**
